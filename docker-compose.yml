version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoparts}
      POSTGRES_USER: ${POSTGRES_USER:-autoparts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoparts}
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      - db
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  pg_data:
